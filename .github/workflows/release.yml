name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Collect release assets
        run: |
          mkdir -p dist
          cp packages/openbe-queen/target/openbe-queen.jar   dist/openbe-queen.jar
          cp packages/openbe-cli/target/openbe-cli.jar       dist/openbe-cli.jar
          cp packages/openbe-hive/worker-bee/target/worker-bee.jar dist/worker-bee.jar
          cp packages/openbe-hive/nurse-bee/target/nurse-bee.jar   dist/nurse-bee.jar
          cp docker-compose.yml                               dist/docker-compose.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenBe ${{ github.ref_name }}"
          body: |
            ## OpenBe ${{ github.ref_name }}

            ### 一键安装

            ```bash
            curl -fsSL https://openbe.ai/install.sh | bash
            ```

            ### 手动下载

            | 文件 | 说明 |
            |------|------|
            | `openbe-queen.jar` | 蜂后核心调度服务 |
            | `openbe-cli.jar`   | 命令行工具 |
            | `worker-bee.jar`   | 工蜂（本地 Ollama 执行） |
            | `nurse-bee.jar`    | 护蜂（健康监控） |
            | `docker-compose.yml` | Redis 基础设施编排 |
          files: |
            dist/openbe-queen.jar
            dist/openbe-cli.jar
            dist/worker-bee.jar
            dist/nurse-bee.jar
            dist/docker-compose.yml
          draft: false
          prerelease: false
