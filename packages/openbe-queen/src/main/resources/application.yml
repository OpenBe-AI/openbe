spring:
  application:
    name: openbe-queen
  web:
    resources:
      cache:
        period: 0
        cachecontrol:
          no-cache: true
          no-store: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

server:
  port: 8080

openbe:
  bee:
    type: QUEEN

logging:
  level:
    com.openbe: DEBUG
